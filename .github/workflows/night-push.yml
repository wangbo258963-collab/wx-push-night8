name: WeChat Goodnight Push

on:
  workflow_dispatch:
  schedule:
    # GitHub Actions 使用 UTC 时间
    # 北京时间晚上 10 点 = UTC 下午 2 点
    - cron: '0 14 * * *'

env:
  TZ: Asia/Shanghai
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run WeChat goodnight push
        env:
          WECHAT_APP_ID: ${{ secrets.WECHAT_APP_ID }}
          WECHAT_APP_SECRET: ${{ secrets.WECHAT_APP_SECRET }}
          WECHAT_TEMPLATE_ID: ${{ secrets.WECHAT_TEMPLATE_ID }}
          WECHAT_USER_OPENIDS: ${{ secrets.WECHAT_USER_OPENIDS }}
          QWEATHER_KEY: ${{ secrets.QWEATHER_KEY }}
          QWEATHER_HOST: ${{ vars.QWEATHER_HOST }}
          REGION: ${{ vars.REGION || '长沙市' }}
          RECEIVER_NAME: ${{ vars.RECEIVER_NAME || '苏苏姐' }}
        run: python main.py
